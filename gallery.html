<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Kuvagalleria</title>
    <link rel="stylesheet" href="myspace.css">
</head>

<body>

    <!-- Slideshow container -->
    <div class="slideshow-container" id="slideshow-inner">
        <!-- Kuvat generoidaan tänne JavaScriptillä -->
        
        <!-- Painikkeet pidetään täällä valmiina, ne jäävät automaattisesti 
             JS:llä luotujen kuvien jälkeen/päälle -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br>

    <!-- The dots container -->
    <div style="text-align:center" id="dot-container">
        <!-- Pisteet generoidaan tänne JavaScriptillä -->
    </div>

    <script>
        let slideIndex = 1;

        const slideshowInner = document.getElementById('slideshow-inner');
        const dotContainer = document.getElementById('dot-container');
        const totalImages = 32;

        // 1. Tyhjennetään pisteet tuplien välttämiseksi
        dotContainer.innerHTML = '';

        // 2. Luodaan kuvat ja pisteet
        // 'afterbegin' asettaa kuvat containerin ALKUUN, jolloin nuolinäppäimet 
        // (jotka ovat jo HTML:ssä) jäävät luonnostaan containerin loppuun kuvien päälle.
        for (let i = 1; i <= totalImages; i++) {
            const slideHtml = `
            <div class="mySlides fade">
                <div class="numbertext">${i} / ${totalImages}</div>
                <img src="gallery/${i}.jpeg" style="width: 100%;">
            </div>`;

            slideshowInner.insertAdjacentHTML('afterbegin', slideHtml);

            const dotHtml = `<span class="dot" onclick="currentSlide(${i})"></span>`;
            dotContainer.innerHTML += dotHtml;
        }

        // 3. Alustetaan näyttö (Painikkeiden JS-siirto poistettu, koska HTML hoitaa sen nyt)
        showSlides(slideIndex);

        // --- Standardit funktiot ---
        function plusSlides(n) {
            showSlides(slideIndex += n);
        }
        function currentSlide(n) {
            showSlides(slideIndex = n);
        }
        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>

</body>

</html>
